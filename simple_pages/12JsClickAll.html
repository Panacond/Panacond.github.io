<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цветовая головоломка</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Arial Black', sans-serif; color: white; }
        #container { display: grid; height: 100vh; width: 100vw; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(4, 1fr); }
        
        @media (max-width: 768px), (orientation: portrait) {
            #container { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(8, 1fr); }
        }

        .tile {
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background-color 0.2s;
            font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            user-select: none; 
            font-size: 8vmin;
        }

        .info-tile { background-color: #2c3e50; cursor: default; font-size: 2.5vmin; text-align: center; font-family: sans-serif; }
        .target-tile { font-size: 12vmin !important; }

        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; color: gold;
            font-size: 8vw; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="win-overlay">
        <div>УРОВЕНЬ ПРОЙДЕН!</div>
        <div style="font-size: 4vw; color: white; margin-top: 20px;" id="win-stats"></div>
    </div>

    <div id="container"></div>

    <script>
        const container = document.querySelector('#container');
        const winOverlay = document.querySelector('#win-overlay');
        const winStats = document.querySelector('#win-stats');
        const buttonSound = new Audio('button-sound.mp3');
        
        let totalClicks = 0;
        let level = 1;
        let targets = []; 
        let currentBoardColors = []; 

        const colors = [
            'rgb(255, 0, 0)', 'rgb(255, 127, 0)', 'rgb(255, 255, 0)', 
            'rgb(0, 255, 0)', 'rgb(0, 0, 255)', 'rgb(75, 0, 130)', 
            'rgb(148, 0, 211)', 'rgb(0, 255, 255)', 'rgb(255, 105, 180)', 'rgb(165, 42, 42)'
        ];

        /**
         * startNewLevel: Создает логику нового уровня.
         * Выбирает случайные цвета для задания и заполняет поле другими цветами.
         */
        function startNewLevel() {
            targets = [];
            let pool = [...Array(colors.length).keys()];
            for (let i = 0; i < 3; i++) {
                const colorIdx = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
                targets.push({ colorIndex: colorIdx, count: Math.floor(Math.random() * 5) + 2 });
            }

            currentBoardColors = [];
            const targetColorValues = targets.map(t => colors[t.colorIndex]);
            for (let i = 0; i < 32; i++) {
                let randomColor;
                do {
                    randomColor = colors[Math.floor(Math.random() * colors.length)];
                } while (targetColorValues.includes(randomColor));
                currentBoardColors[i] = randomColor;
            }
            renderBoard();
        }

        /**
         * renderBoard: Создает HTML-элементы плиток.
         * Расставляет инфо-блоки в зависимости от того, вертикальный экран или горизонтальный.
         */
        function renderBoard() {
            container.innerHTML = '';
            winOverlay.style.display = 'none';
            const isPortrait = window.innerWidth < window.innerHeight;
            
            for (let i = 0; i < 32; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');

                let isInfo = isPortrait ? (i < 4) : ((i + 1) % 8 === 0);
                let infoPos = isPortrait ? i : Math.floor(i / 8);

                if (isInfo) {
                    tile.classList.add('info-tile');
                    if (infoPos === 0) {
                        tile.id = "stat-tile";
                        tile.innerHTML = `КЛИКИ<br>${totalClicks}<br>УРОВЕНЬ<br>${level}`;
                    } else {
                        const targetData = targets[infoPos - 1];
                        tile.classList.add('target-tile');
                        tile.style.backgroundColor = colors[targetData.colorIndex];
                        tile.id = `target-${infoPos - 1}`;
                    }
                } else {
                    tile.style.backgroundColor = currentBoardColors[i];
                    tile.dataset.index = i;
                    tile.onclick = handleTileClick;
                }
                container.appendChild(tile);
            }
            updateCounters();
        }

        /**
         * toggleFullScreen: Проверяет, включен ли полноэкранный режим.
         * Если нет — запрашивает его у браузера.
         */
        function toggleFullScreen() {
            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.msFullscreenElement) {
                
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
                else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
            }
        }

        /**
         * handleTileClick: Основная логика клика по игровой плитке.
         * 1. Пытается вернуть полноэкранный режим.
         * 2. Меняет цвет плитки на следующий в списке.
         * 3. Обновляет статистику и проверяет победу.
         */
        function handleTileClick(e) {
            // Пытаемся вернуться в полноэкранный режим при ЛЮБОМ клике, если мы не в нем
            toggleFullScreen();

            const tile = e.target;
            const idx = tile.dataset.index;
            totalClicks++;

            let colorIdx = colors.indexOf(tile.style.backgroundColor);
            let nextIdx = (colorIdx + 1) % colors.length;
            let nextColor = colors[nextIdx];

            tile.style.backgroundColor = nextColor;
            currentBoardColors[idx] = nextColor; 

            const statTile = document.getElementById('stat-tile');
            if (statTile) statTile.innerHTML = `КЛИКИ<br>${totalClicks}<br>УРОВЕНЬ<br>${level}`;

            buttonSound.play().catch(() => {});
            updateCounters();
        }

        /**
         * updateCounters: Подсчитывает количество цветов на поле.
         * Обновляет цифры в "целях". Если все цели = 0, уровень пройден.
         */
        function updateCounters() {
            const counts = Array(colors.length).fill(0);
            const isPortrait = window.innerWidth < window.innerHeight;

            for (let i = 0; i < 32; i++) {
                let isInfo = isPortrait ? (i < 4) : ((i + 1) % 8 === 0);
                if (!isInfo) {
                    counts[colors.indexOf(currentBoardColors[i])]++;
                }
            }

            let win = true;
            targets.forEach((t, i) => {
                const display = document.getElementById(`target-${i}`);
                if (display) {
                    const remaining = t.count - counts[t.colorIndex];
                    if (remaining !== 0) {
                        display.textContent = remaining; 
                        win = false;
                    } else {
                        display.textContent = ""; 
                    }
                }
            });

            if (win) {
                winStats.textContent = `Всего кликов: ${totalClicks}`;
                winOverlay.style.display = 'flex';
                setTimeout(() => { level++; startNewLevel(); }, 2000);
            }
        }

        window.addEventListener('resize', renderBoard);
        startNewLevel();
        
    </script>
</body>
</html>
